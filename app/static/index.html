<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산 부동산 가격 조회</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a2a4a 0%, #2c4a7c 100%);
    color: white; padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 22px; font-weight: 600; }
  header p  { font-size: 13px; color: #8eb4e3; margin-top: 4px; }

  .search-wrap {
    background: white;
    border-bottom: 1px solid #e0e4ea;
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .search-box {
    max-width: 700px; margin: 0 auto;
    display: flex; gap: 10px;
  }
  .search-box input {
    flex: 1; padding: 12px 16px;
    border: 2px solid #d0d7e4; border-radius: 8px;
    font-size: 15px; font-family: inherit;
    transition: border-color .2s;
  }
  .search-box input:focus { outline: none; border-color: #3a7bd5; }
  .search-box button {
    padding: 12px 28px; background: #3a7bd5; color: white;
    border: none; border-radius: 8px; font-size: 15px;
    font-family: inherit; cursor: pointer; white-space: nowrap;
    transition: background .2s;
  }
  .search-box button:hover    { background: #2d65b8; }
  .search-box button:disabled { background: #9ab5db; cursor: not-allowed; }

  .container { max-width: 980px; margin: 24px auto; padding: 0 16px; }

  .card {
    background: white; border-radius: 10px;
    padding: 20px 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  /* 배지 */
  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 12px; font-size: 12px; font-weight: 600;
  }
  .badge-오피스텔  { background: #dbeafe; color: #1d4ed8; }
  .badge-공동주택  { background: #d1fae5; color: #065f46; }
  .badge-혼합      { background: #ede9fe; color: #6d28d9; }
  .badge-기타      { background: #f3f4f6; color: #6b7280; }

  /* 건물 헤더 */
  .bldg-header {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 16px;
  }
  .bldg-header .addr { font-size: 16px; font-weight: 700; color: #1a2a4a; }
  .bldg-header .meta { font-size: 12px; color: #777; }

  /* 섹션 구분선 */
  .section-title {
    font-size: 13px; font-weight: 700; color: #555;
    margin: 0 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-divider { border: none; border-top: 1px solid #e8edf4; margin: 20px 0; }

  /* 테이블 */
  .result-count { font-size: 12px; color: #888; margin-bottom: 8px; }
  .table-wrap  { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 560px; }
  th {
    background: #f0f4f8; padding: 9px 10px;
    text-align: left; border-bottom: 2px solid #d0d7e4;
    white-space: nowrap; font-size: 12px; color: #555;
  }
  td { padding: 8px 10px; border-bottom: 1px solid #edf0f4; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f7f9ff; }
  .num   { text-align: right; }
  .price { font-weight: 600; color: #1a2a4a; text-align: right; }
  .hug-col { color: #b45309; font-weight: 600; text-align: right; }

  /* 개별공시지가 바 */
  .gongsi-bar {
    display: inline-flex; align-items: center; gap: 10px;
    background: #f0fdf4; border: 1px solid #86efac;
    border-radius: 8px; padding: 7px 14px;
    margin-bottom: 16px; font-size: 13px;
  }
  .gongsi-label { color: #166534; font-weight: 600; }
  .gongsi-price { color: #15803d; font-weight: 700; font-size: 15px; }

  /* 상태 메시지 */
  .msg-loading { color: #3a7bd5; padding: 32px; text-align: center; font-size: 15px; }
  .msg-empty   { color: #6b7280; padding: 24px; text-align: center; font-size: 14px; }
  .msg-error   {
    color: #dc2626; padding: 14px 18px;
    background: #fef2f2; border-radius: 8px; font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>부산 부동산 가격 조회</h1>
  <p>2026년 기준 · 오피스텔 기준시가 / 공동주택 공시가격</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input id="addr_input" type="text"
      placeholder="주소 입력 (예: 부산 동래구 온천동 1410-5)"
      onkeydown="if(event.key==='Enter') doSearch()" />
    <button id="search_btn" onclick="doSearch()">조회</button>
  </div>
</div>

<div class="container">
  <div id="result_area"></div>
</div>

<script>
const KAKAO_KEY = '665c3a3b10292afb05411a6cd25599da';

// ── 카카오 지오코딩 ────────────────────────────────────────────
async function geocode(addr) {
  const url = `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(addr)}`;
  const resp = await fetch(url, { headers: { Authorization: `KakaoAK ${KAKAO_KEY}` } });
  if (!resp.ok) throw new Error('주소 검색 실패 (카카오 API)');
  const data = await resp.json();
  if (!data.documents?.length) return null;
  const doc = data.documents[0];
  const a = doc.address || doc.road_address;
  if (!a) return null;
  return {
    bdong_cd: a.b_code,
    bun: parseInt(a.main_address_no) || 0,
    ji:  parseInt(a.sub_address_no)  || 0,
    address_name: doc.address_name,
  };
}

// ── 숫자 포맷 ──────────────────────────────────────────────────
function fmt(n) {
  if (n == null || n === '') return '-';
  return Number(n).toLocaleString('ko-KR') + '원';
}

// ── 검색 ───────────────────────────────────────────────────────
async function doSearch() {
  const addr = document.getElementById('addr_input').value.trim();
  if (!addr) return alert('주소를 입력하세요');

  const btn = document.getElementById('search_btn');
  btn.disabled = true;
  btn.textContent = '조회 중...';
  setLoading('주소를 검색하는 중입니다...');

  try {
    const geo = await geocode(addr);
    if (!geo) { showError('주소를 찾을 수 없습니다. 더 구체적인 주소를 입력해 주세요.'); return; }

    setLoading('건물 정보를 조회하는 중입니다...');

    const r = await fetch(`/api/lookup?bdong_cd=${geo.bdong_cd}&bun=${geo.bun}&ji=${geo.ji}`);
    if (!r.ok) throw new Error(`서버 오류 (HTTP ${r.status})`);
    const data = await r.json();

    renderResult(geo, data);
  } catch(e) {
    showError(e.message || '오류가 발생했습니다.');
  } finally {
    btn.disabled = false;
    btn.textContent = '조회';
  }
}

// ── 결과 렌더링 ────────────────────────────────────────────────
function renderResult(geo, data) {
  const hasGJ = data.gigjungsi_count > 0;
  const hasGD = data.gongdong_count  > 0;
  const total  = (data.gigjungsi_count || 0) + (data.gongdong_count || 0);

  if (!total) {
    document.getElementById('result_area').innerHTML = `
      <div class="card">
        <div class="bldg-header">
          <span class="addr">${geo.address_name}</span>
          <span class="badge badge-${data.bldg_type}">${data.bldg_type}</span>
        </div>
        <div class="msg-empty">조회된 가격 정보가 없습니다.<br>
          <small>DB에 해당 주소의 데이터가 없거나 주소가 정확하지 않을 수 있습니다.</small></div>
      </div>`;
    return;
  }

  // 건물 헤더
  let html = `<div class="card">
    <div class="bldg-header">
      <span class="addr">${geo.address_name}</span>
      <span class="badge badge-${data.bldg_type}">${data.bldg_type}</span>`;
  if (data.bldg_info) {
    const b = data.bldg_info;
    const yr = b.use_apr_day ? b.use_apr_day.substring(0,4) + '년 준공' : '';
    html += `<span class="meta">${b.strct_nm||''} ${yr ? '· '+yr : ''}</span>`;
  }
  if (data.gongsi_price != null) {
    html += `<div class="gongsi-bar">
      <span class="gongsi-label">개별공시지가 (2026)</span>
      <span class="gongsi-price">${Number(data.gongsi_price).toLocaleString('ko-KR')}원/㎡</span>
    </div>`;
  }

  html += `</div>`;

  // ── 오피스텔 섹션 ──
  if (hasGJ) {
    if (hasGD) html += `<div class="section-title"><span class="badge badge-오피스텔">오피스텔</span> 기준시가</div>`;

    html += `<div class="result-count">${data.gigjungsi_count}건</div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>건물명</th><th>층</th><th>호</th>
        <th class="num">전용면적(㎡)</th>
        <th class="num">공용면적(㎡)</th>
        <th class="num">건물면적(㎡)</th>
        <th class="num">고시가격(원/㎡)</th>
        <th class="num">기준시가 합계</th>
        <th class="num hug-col">허그보증보험 한도</th>
      </tr></thead>
      <tbody>`;

    data.gigjungsi_items.forEach(r => {
      const hug = Math.round(r.total_price * 1.26);
      html += `<tr>
        <td>${r.bldg_name||'-'}</td>
        <td>${r.floor_no||'-'}층</td>
        <td>${r.ho_no||'-'}</td>
        <td class="num">${r.excl_area}</td>
        <td class="num">${r.share_area}</td>
        <td class="num">${Number(r.bldg_area).toFixed(3)}</td>
        <td class="price">${Number(r.price).toLocaleString('ko-KR')}</td>
        <td class="price">${Number(r.total_price).toLocaleString('ko-KR')}원</td>
        <td class="hug-col">${Number(hug).toLocaleString('ko-KR')}원</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // ── 구분선 ──
  if (hasGJ && hasGD) html += `<hr class="section-divider">`;

  // ── 공동주택(다세대) 섹션 ──
  if (hasGD) {
    if (hasGJ) html += `<div class="section-title" style="margin-top:4px"><span class="badge badge-공동주택">공동주택</span> 공시가격</div>`;

    html += `<div class="result-count">${data.gongdong_count}건</div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>단지명</th><th>동</th><th>층</th><th>호명</th>
        <th class="num">전용면적(㎡)</th>
        <th class="num">공동주택 공시가격</th>
        <th class="num hug-col">허그보증보험 한도</th>
      </tr></thead>
      <tbody>`;

    data.gongdong_items.forEach(r => {
      const hug = Math.round(r.price * 1.26);
      html += `<tr>
        <td>${r.danji_nm||'-'}</td>
        <td>${r.dong||'-'}</td>
        <td>${r.floor||'-'}층</td>
        <td>${r.ho_nm||'-'}</td>
        <td class="num">${r.excl_area}</td>
        <td class="price">${Number(r.price).toLocaleString('ko-KR')}원</td>
        <td class="hug-col">${Number(hug).toLocaleString('ko-KR')}원</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  html += `</div>`;
  document.getElementById('result_area').innerHTML = html;
}

// ── 유틸 ──────────────────────────────────────────────────────
function setLoading(msg) {
  document.getElementById('result_area').innerHTML =
    `<div class="card msg-loading">${msg}</div>`;
}
function showError(msg) {
  document.getElementById('result_area').innerHTML =
    `<div class="card"><div class="msg-error">오류: ${msg}</div></div>`;
}
</script>
</body>
</html>
